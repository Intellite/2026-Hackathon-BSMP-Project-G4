{% extends 'layout/base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-10">
  <div class="max-w-2xl mx-auto">
    <div class="survey-card rounded-2xl border border-slate-800 bg-slate-950 shadow-sm p-6 text-white theme-light:bg-white theme-light:text-slate-900 text-center">
      <div class="flex items-center justify-between gap-3">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-600 text-white"></div>
      <h1 class="text-2xl font-semibold mt-4" style="color: #e2e8f0;" data-theme-light-color="#0f172a">Take the survey to unlock features</h1>
      <p class="text-slate-300 mt-2" style="color: rgba(226,232,240,.75);" data-theme-light-color="#334155">
        We’ll use your answers to personalize your Compass AI recommendations.
      </p>

      <div class="mt-6 row g-3 justify-content-center">
        <div class="col-12 col-sm-6 d-flex justify-content-center">
          <a href="{{ url_for('survey.step', step=0) }}" class="btn btn-primary w-100 rounded-3 py-2.5 font-semibold" style="border:none;">
            Take survey
          </a>
        </div>
      </div>

      <p class="text-xs text-slate-400 mt-4" style="color: rgba(148,163,184,.9);" data-theme-light-color="#64748b">
        You can retake the survey after you finish it.
      </p>
    </div>
  </div>
</div>

<script>
  (function () {
    const body = document.body;
    const apply = () => {
      const isLight = body.classList.contains('theme-light');
      document.querySelectorAll('[data-theme-light-color]').forEach((el) => {
        const lightColor = el.getAttribute('data-theme-light-color');
        if (!lightColor) return;
        if (isLight) el.style.color = lightColor;
      });
    };
    apply();
    window.addEventListener('storage', apply);
    window.addEventListener('click', apply);
  })();
</script>
{% endblock %}
