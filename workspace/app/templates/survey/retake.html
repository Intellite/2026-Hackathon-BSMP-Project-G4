{% extends 'layout/base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-10">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-semibold">Retake the survey?</h1>
    <p class="text-black mt-2">
      You can retake the survey to update your recommendations. Your previous answers will be replaced.
    </p>

    <form method="post" class="mt-8 flex gap-3">
      <a href="{{ url_for('dashboard.index') }}" class="rounded-xl border border-slate-200 px-6 py-2.5 text-slate-800 font-medium hover:bg-slate-50">
        Cancel
      </a>
      <button type="submit" class="rounded-xl bg-rose-600 px-6 py-2.5 text-black font-medium hover:bg-rose-500">
        Yes, retake
      </button>
    </form>
  </div>
</div>
{% endblock %}
