{% extends 'layout/base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-10">
  <div class="max-w-2xl mx-auto text-center">
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-emerald-100 text-emerald-700">
      ✓
    </div>
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-emerald-100 text-emerald-700">
      <h1 class="text-2xl font-semibold mt-0">Survey complete</h1>
      <p class="text-slate-300 mt-2 dark:text-slate-300">Your recommendations are now unlocked.</p>

      <div class="mt-8 flex items-center justify-center gap-3">
        <a
          href="{{ url_for('dashboard.index') }}"
          class="btn btn-outline-primary dashboard-btn rounded-xl px-6 py-2.5 font-semibold"
        >
          Go to dashboard
        </a>
        <a
          href="{{ url_for('survey.retake') }}"
          class="btn btn-outline-primary dashboard-btn rounded-xl px-6 py-2.5 font-semibold"
        >
          Retake survey
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
