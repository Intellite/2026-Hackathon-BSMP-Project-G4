{% extends 'layout/base.html' %}
{% block content %}
  <div class="row g-3">
    <div class="col-12 col-lg-4">
      <div class="card rounded-4 shadow-sm border p-4 h-100" style="background: rgba(148,163,184,.06) !important; border-color: rgba(148,163,184,.35) !important;">
        <h2 class="h5 fw-bold">AI Mentor</h2>
        <p class="text-muted small">ChatGPT-style mentor. Your conversation history is saved.</p>
        <div class="mt-3">
          <div class="fw-semibold">Recent chats</div>
          <div class="list-group mt-2">
            {% for c in conversations %}
              <button type="button" class="list-group-item list-group-item-action" onclick="selectConversation(this.dataset.id)" data-id="{{ c.id }}">
                {{ c.title or ('Chat ' ~ c.id) }}
              </button>
            {% endfor %}
          </div>
        </div>
        
      </div>
    </div>

    <div class="col-12 col-lg-8">
      <div class="card rounded-4 shadow-sm border p-4" style="background: rgba(148,163,184,.06) !important; border-color: rgba(148,163,184,.35) !important;">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <div class="fw-bold">Ask your mentor</div>
            <div class="text-muted small">Careers • College • Interviews • Resume help</div>
          </div>
          <button class="btn btn-outline-primary btn-sm" onclick="newConversation()">New chat</button>
        </div>

        <div id="chatBox" class="chat-box mt-3" aria-live="polite"></div>

        <form id="chatForm" class="mt-3" onsubmit="return sendMessage(event)">
          <div class="input-group">
            <input id="chatInput" class="form-control" placeholder="Type your question..." />
            <button class="btn btn-primary" type="submit">Send</button>
          </div>
          <div class="form-text">Tip: Ask “What careers match my interests?”</div>
        </form>
      </div>
    </div>
  </div>

  <script>
    let conversationId = null;

    function selectConversation(id) {
      conversationId = id;
      document.getElementById('chatBox').innerHTML = '';
      addMessage('assistant', 'Loaded chat #' + id + '. Ask a new question to continue.');
    }

    function newConversation() {
      conversationId = null;
      document.getElementById('chatBox').innerHTML = '';
      addMessage('assistant', 'New chat started. What would you like to work on today?');
    }

    function addMessage(role, text) {
      const box = document.getElementById('chatBox');
      const wrapper = document.createElement('div');
      wrapper.className = 'chat-message ' + (role === 'user' ? 'chat-user' : 'chat-assistant');
      wrapper.innerHTML = '<div class="chat-bubble">' + text.replace(/</g,'&lt;') + '</div>';
      box.appendChild(wrapper);
      box.scrollTop = box.scrollHeight;
    }

    async function sendMessage(e) {
      e.preventDefault();
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return false;

      addMessage('user', message);
      input.value = '';

      const res = await fetch('{{ url_for("mentor.chat") }}', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ conversation_id: conversationId, message })
      });

      const data = await res.json();
      if (!res.ok) {
        addMessage('assistant', data.error || 'Something went wrong.');
        return false;
      }

      conversationId = data.conversation_id;
      addMessage('assistant', data.reply);
      return false;
    }

    // initial
    addMessage('assistant', 'Hi! I’m your Compass AI mentor. Ask me about careers, college, interviews, or resumes.');
  </script>

  <style>
    /* Transparent chat UI with visible borders */
    .chat-box {
      background: rgba(148,163,184,.06) !important;
      border: 1px solid rgba(148,163,184,.35) !important;
      border-radius: 1rem;
      padding: 1rem;
    }

    .chat-message .chat-bubble {
      background: rgba(148,163,184,.06) !important;
      border: 1px solid rgba(148,163,184,.35) !important;
      border-radius: 1rem;
      padding: 0.75rem 1rem;
    }
  </style>
{% endblock %}
